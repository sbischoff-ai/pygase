name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dependencies
        run: poetry install

      - name: Run tests
        run: poetry run pytest tests --doctest-modules --junitxml=junit/test-results.xml --cov=pygase --cov-report=xml --cov-report=html

      - name: Check types
        run: poetry run mypy pygase

      - name: Lint
        run: poetry run pylint-fail-under --fail_under 9.9 pygase

      - name: Check docstring style
        run: poetry run pydocstyle pygase

      - name: Upload test and coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-py${{ matrix.python-version }}
          path: |
            junit/test-results.xml
            coverage.xml
            htmlcov
