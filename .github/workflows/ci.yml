name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test-and-quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install project and QA dependencies
        run: |
          uv pip install --system -e .
          uv pip install --system pytest pytest-cov mypy pylint pylint-fail-under pydocstyle freezegun

      - name: Run tests
        run: |
          mkdir -p junit
          pytest tests --doctest-modules --junitxml=junit/test-results.xml --cov=pygase --cov-report=xml --cov-report=html

      - name: Check types
        run: mypy pygase

      - name: Lint
        run: pylint-fail-under --fail_under 9.9 pygase

      - name: Check docstring style
        run: pydocstyle pygase

      - name: Upload test results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-py${{ matrix.python-version }}
          path: junit/test-results.xml

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python-version }}
          path: |
            coverage.xml
            htmlcov/

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
